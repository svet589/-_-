            transition: 0.1s;
            font-family: inherit;

            margin-bottom: 20px;

            transform: translateY(3px);
            box-shadow: 0 2px 0 #6b7f9c;
        }
        .section-header {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 25px;
            color: #2d4059;
        }
        .block {
            margin: 20px 0;
            border: 3px solid #ffb347;
            border-radius: 25px;
            overflow: hidden;
            background: white;
        }

            background: #ffd966;
            padding: 15px 25px;
            font-weight: bold;
            font-size: 1.3rem;

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 25px;
            display: block;
            line-height: 1.8;
            font-size: 1.05rem;
        }

            background: #fff3cd;
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;

        }

            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        table {

            border-collapse: collapse;
            margin: 15px 0;
            font-size: 1rem;
        }
        th {
            background: #ffd966;
            padding: 12px;
            border: 2px solid #d4a259;
            font-size: 1rem;
        }
        td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        .badge-grid {

            gap: 12px;
        }
        .badge-item {
            background: #ffe0b0;

            padding: 15px;
            text-align: center;
            border: 2px solid #d4a259;
            font-size: 1rem;
            line-height: 1.5;

// ==================== ФУНКЦИИ ====================
function openSection(sectionId) {
    const data = ENCYCLOPEDIA[sectionId];
    const screen = document.getElementById('sectionScreen');
    const content = document.getElementById('sectionContent');
    
    let html = `
        <button class="back-btn" onclick="closeSection()">↩️ Назад к разделам</button>
        <div class="section-header">${data.title}</div>
    `;
    
    data.blocks.forEach(block => {
        html += `
            <div class="block">
                <div class="block-title" onclick="toggleBlock(this)">
                    <span>${block.title}</span>
                    <span>▼</span>
                </div>
                <div class="block-body">
                    ${block.content}
                </div>
            </div>
        `;
    });
    
    content.innerHTML = html;
    screen.classList.add('active');
    document.body.style.overflow = 'hidden'; // Запрет скролла фона
}

function closeSection() {
    const screen = document.getElementById('sectionScreen');
    screen.classList.remove('active');
    document.body.style.overflow = ''; // Возвращаем скролл
}

function toggleBlock(header) {
    const body = header.nextElementSibling;
    const arrow = header.querySelector('span:last-child');
    if (body.style.display === 'none') {
        body.style.display = 'block';
        arrow.textContent = '▼';
    } else {
        body.style.display = 'none';
        arrow.textContent = '▶';
    }
}

// Поиск
document.getElementById('searchInput').addEventListener('input', function(e) {
    const query = e.target.value.toLowerCase().trim();
    if (!query) return;
    
    if (query.length < 2) return; // Ищем от 2 букв
    
    // Ищем по всем разделам, открываем первый найденный
    for (const [sectionId, sectionData] of Object.entries(ENCYCLOPEDIA)) {
        for (const block of sectionData.blocks) {
            const text = block.title + ' ' + block.content.replace(/<[^>]*>/g, ' ');
            if (text.toLowerCase().includes(query)) {
                openSection(sectionId);
                // Подсветка (простая)
                setTimeout(() => {
                    const allBlocks = document.querySelectorAll('.block-body');
                    allBlocks.forEach(b => {
                        b.innerHTML = b.innerHTML.replace(
                            new RegExp(`(${query})`, 'gi'),
                            '<mark style="background:#ffeb3b;padding:2px 4px;border-radius:4px;">$1</mark>'
                        );
                    });
                }, 100);
                return;
            }
        }
    }
    showNotification('😔 Ничего не найдено. Попробуй другое слово!', false);
});

// Уведомление
function showNotification(text, isGood) {
    const n = document.createElement('div');
    n.textContent = text;
    n.style.cssText = `
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: ${isGood ? '#d4edc9' : '#ffe0b0'}; border: 2px solid ${isGood ? '#4caf50' : '#ff9800'};
        border-radius: 40px; padding: 12px 25px; z-index: 9999; font-weight: bold;
        font-family: 'Comic Neue', cursive; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    `;
    document.body.appendChild(n);
    setTimeout(() => { n.style.opacity = '0'; n.style.transition = '0.3s'; }, 2000);
    setTimeout(() => n.remove(), 2500);
}
</script>
