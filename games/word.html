<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❓ Отгадай слово — Академия</title>
    <style>
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'Comic Neue',cursive,sans-serif; background:radial-gradient(circle at 20% 20%,#f9d56e,#f8b042); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .game-container { max-width:450px; width:100%; background:rgba(255,255,255,0.95); border-radius:40px; padding:25px; box-shadow:0 20px 40px rgba(0,0,0,0.3); border:5px solid #ffb347; text-align:center; }
        h2 { color:#2d4059; margin-bottom:15px; }
        .word { font-size:2.5rem; letter-spacing:10px; margin:20px 0; }
        .info { margin:10px 0; color:#666; }
        input { padding:10px; font-size:2rem; width:80px; text-align:center; border-radius:20px; border:3px solid #ffb347; font-family:inherit; }
        button { background:#f9d342; border:none; border-radius:20px; padding:12px 25px; font-weight:bold; font-size:1.1rem; cursor:pointer; box-shadow:0 4px 0 #b47c2e; font-family:inherit; margin:5px; }
        button:active { transform:translateY(3px); box-shadow:0 1px 0 #b47c2e; }
        .back-btn { background:#b3c7e5; box-shadow:0 4px 0 #6b7f9c; }
    </style>
</head>
<body>
<div class="game-container">
    <h2>❓ Отгадай слово</h2>
    <div class="word" id="wordDisplay"></div>
    <p class="info">Ошибок: <span id="attempts">7</span></p>
    <p class="info">Буквы: <span id="wrong">—</span></p>
    <input type="text" id="letter" maxlength="1" placeholder="?">
    <br>
    <button onclick="guess()">✅ Проверить</button>
    <button class="back-btn" onclick="window.close()">↩️ Закрыть</button>
</div>
<script>
const words=["ШКОЛА","КОСМОС","РОБОТ","ЯБЛОКО","СОЛНЦЕ","ПЛАНЕТА","ГАЛАКТИКА","АТОМ","ДЕРЕВО","ЦВЕТОК","ТРАВА","ЛИСТ","СОЛНЦЕ","ДОЖДЬ","СНЕГ","ВЕТЕР","ТУЧА","МОЛНИЯ","РАДУГА","ЛУЖА","РЕКА","ОЗЕРО","МОРЕ","ЛЕС","ПОЛЕ","ГОРА"];
const word=words[Math.floor(Math.random()*words.length)];
let guessed='_'.repeat(word.length).split('');
let wrong=[], attempts=7;

function render() {
    document.getElementById('wordDisplay').textContent=guessed.join(' ');
    document.getElementById('attempts').textContent=attempts;
    document.getElementById('wrong').textContent=wrong.join(', ')||'—';
}

function guess() {
    const l=document.getElementById('letter').value.toUpperCase();
    document.getElementById('letter').value='';
    if(!l||wrong.includes(l)||guessed.includes(l))return;
    if(word.includes(l)){for(let i=0;i<word.length;i++)if(word[i]===l)guessed[i]=l;}
    else {wrong.push(l); attempts--;}
    if(guessed.join('')===word){alert('🎉 Победа! Слово: '+word);window.close();}
    if(attempts<=0){alert('😢 Проиграл. Слово: '+word);window.close();}
    render();
}
render();
</script>
</body>
</html>
